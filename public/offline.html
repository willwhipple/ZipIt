<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zip It — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f9ff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      max-width: 320px;
      box-shadow: 0 4px 24px -4px rgba(0,0,0,0.10);
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #60a5fa, #1d4ed8);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    h1 { font-size: 20px; font-weight: 700; color: #111; margin-bottom: 8px; }
    p  { font-size: 14px; color: #6b7280; line-height: 1.5; }
    button {
      margin-top: 24px;
      background: #0ea5e9;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        <rect x="3" y="8" width="18" height="12" rx="2"/>
        <line x1="3" y1="14" x2="21" y2="14"/>
        <line x1="9" y1="8" x2="9" y2="20"/>
        <line x1="15" y1="8" x2="15" y2="20"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Check your connection and try again. Your packing lists are saved and ready when you're back online.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
