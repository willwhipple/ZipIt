<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Suitcase icon centered, scaled from 24x24 viewBox to ~72x72 at center -->
  <!-- Scale factor: 72/24 = 3.0, centered: translate(14, 11) -->
  <g transform="translate(14, 11) scale(3.0)" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Handle -->
    <path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
    <!-- Body -->
    <rect x="3" y="8" width="18" height="12" rx="2"/>
    <!-- Horizontal zipper line -->
    <line x1="3" y1="14" x2="21" y2="14"/>
    <!-- Left vertical strap -->
    <line x1="9" y1="8" x2="9" y2="20"/>
    <!-- Right vertical strap -->
    <line x1="15" y1="8" x2="15" y2="20"/>
    <!-- Wheels -->
    <circle cx="7.5" cy="21.5" r="0.75" fill="white" stroke="none"/>
    <circle cx="16.5" cy="21.5" r="0.75" fill="white" stroke="none"/>
  </g>
</svg>
